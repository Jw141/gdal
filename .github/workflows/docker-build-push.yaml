name: Build and Secure GDAL Base Images

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write 

    strategy:
      fail-fast: false 
      matrix:
        include:
          - image_identifier: gdal-ubuntu
            image_name: jw141/gdal-base
            dockerfile: Dockerfile.ubuntu      
            prod_tag: ubuntu-latest
          - image_identifier: gdal-rockylinux
            image_name: jw141/gdal-base
            dockerfile: Dockerfile.rockylinux
            prod_tag: rockylinux-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIX: Installs the advanced builder driver required to handle 'type=gha' caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Load Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true 
          tags: ${{ env.REGISTRY }}/${{ matrix.image_name }}:temp-${{ matrix.image_identifier }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy (Table output for logs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image_name }}:temp-${{ matrix.image_identifier }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Run Trivy (SARIF for Security tab)
        id: trivy-scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image_name }}:temp-${{ matrix.image_identifier }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.image_identifier }}.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: '1' 

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.trivy-scan.outcome != 'skipped'
        with:
          sarif_file: 'trivy-results-${{ matrix.image_identifier }}.sarif'

      - name: Final Build and Push
        if: success() 
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ matrix.prod_tag }}
            ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ matrix.prod_tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
name: Build, Scan, and Push Multi-OS Base Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # If one OS fails to build/scan, don't kill the other one
      matrix:
        include:
          - os_name: ubuntu
            file_path: ./Dockerfile.ubuntu      # Match your literal file name here
          - os_name: rockylinux
            file_path: ./Dockerfile.rockylinux

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Step 1: Build local image variant using matrix configurations
    - name: Build Local Image for Scanning
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ matrix.file_path }}
        load: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gdal-base:${{ matrix.os_name }}-test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Step 2: Scan the specific OS image variant
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/gdal-base:${{ matrix.os_name }}-test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # Step 3: If safe, push with clean OS-specific tags
    - name: Build and Push to Docker Hub
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ matrix.file_path }}
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/gdal-base:${{ matrix.os_name }}-latest
          ${{ secrets.DOCKERHUB_USERNAME }}/gdal-base:${{ matrix.os_name }}-${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
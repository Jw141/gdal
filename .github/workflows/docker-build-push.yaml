name: Build and Secure GDAL Base Images

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # Required to upload scan results to the Security tab

    strategy:
      fail-fast: false # If one OS flavor has a CVE vulnerability, don't cancel the other build
      matrix:
        include:
          - image_identifier: gdal-ubuntu
            image_name: jw141/gdal-base
            dockerfile: Dockerfile.ubunt
            prod_tag: ubuntu-latest
          - image_identifier: gdal-rockylinux
            image_name: jw141/gdal-base
            dockerfile: Dockerfile.rockylinux
            prod_tag: rockylinux-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Load Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true # Loads image into the local runner so Trivy can see it
          tags: ${{ env.REGISTRY }}/${{ matrix.image_name }}:temp-${{ matrix.image_identifier }}

      - name: Run Trivy (Table output for logs)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image_name }}:temp-${{ matrix.image_identifier }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Don't fail yet, we want to save the SARIF next

      - name: Run Trivy (SARIF for Security tab)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image_name }}:temp-${{ matrix.image_identifier }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.image_identifier }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # This will fail the build if vulnerabilities exist

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Ensure the upload happens even if the step above fails
        with:
          sarif_file: 'trivy-results-${{ matrix.image_identifier }}.sarif'

      - name: Final Build and Push
        if: success() # Only push if the scan passed
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ matrix.prod_tag }}
            ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ matrix.prod_tag }}-${{ github.sha }}